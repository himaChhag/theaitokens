<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1E3A8A 0%, #38BDF8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            color: white;
            z-index: 2;
            max-width: 900px;
            padding: 40px;
        }
        
        .logo {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .tagline {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.95;
        }
        
        .description {
            font-size: 24px;
            font-weight: 400;
            opacity: 0.85;
            line-height: 1.4;
        }
        
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 25% 25%, white 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, white 2px, transparent 2px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }
        
        .accent {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 18px;
            font-weight: 500;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    <div class="container">
        <div class="logo">🤖 The AI Tokens</div>
        <div class="tagline">AI Model Pricing & Token Calculator</div>
        <div class="description">Compare costs across OpenAI, Claude & Gemini models</div>
    </div>
    <div class="accent">theaitokens.com</div>
</body>
</html>
